<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Program</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f7f4;
            --bg-sidebar: #f0ede8;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: rgba(0,0,0,0.1);
            --accent: #6366f1;
            --accent-light: #eef2ff;
            --user-avatar: #e2e8f0;
            --user-avatar-text: #475569;
            --hover: rgba(0,0,0,0.05);
            --input-bg: #ffffff;
        }

        body.dark {
            --bg-primary: #212121;
            --bg-secondary: #2a2a2a;
            --bg-sidebar: #1a1a1a;
            --text-primary: #ececec;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: rgba(255,255,255,0.1);
            --accent: #818cf8;
            --accent-light: #2d2f5e;
            --user-avatar: #3a3a3a;
            --user-avatar-text: #9ca3af;
            --hover: rgba(255,255,255,0.05);
            --input-bg: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 12px;
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 4px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .logo-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-theme {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 6px;
            color: var(--text-secondary);
        }

        .btn-theme:hover { background: var(--hover); }

        .btn-new {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }

        .btn-new:hover { background: var(--hover); }

        .sidebar-section-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            padding: 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .conv-item {
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s;
        }

        .conv-item:hover { background: var(--hover); color: var(--text-primary); }
        .conv-item.active { background: var(--bg-primary); color: var(--text-primary); font-weight: 500; }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 6px 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--user-avatar);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--user-avatar-text);
            flex-shrink: 0;
        }

        .user-info { flex: 1; }
        .user-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
        .user-plan { font-size: 11px; color: var(--text-muted); }

        /* ===== MAIN CHAT ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
        }

        .chat-header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .model-badge {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* ===== MESSAGES ===== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message-row {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-avatar-text {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
            background: var(--user-avatar);
            color: var(--user-avatar-text);
        }

        .msg-content { flex: 1; min-width: 0; }

        .msg-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .msg-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .msg-text pre {
            margin: 12px 0;
            border-radius: 10px;
            overflow: hidden;
        }

        .msg-text pre code {
            font-size: 13px !important;
            padding: 16px !important;
        }

        .msg-text code:not(pre code) {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: var(--accent);
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Typing indicator */
        .typing-row {
            display: flex;
            gap: 14px;
            align-items: center;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Welcome screen */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px;
        }

        .welcome-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .welcome p {
            font-size: 15px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 420px;
            line-height: 1.6;
        }

        .suggestions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
            max-width: 500px;
            width: 100%;
        }

        .suggestion {
            padding: 12px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            text-align: left;
            line-height: 1.4;
        }

        .suggestion:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            max-height: 160px;
            line-height: 1.5;
            font-family: inherit;
        }

        .input-wrapper textarea::placeholder { color: var(--text-muted); }

        .btn-send {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        .btn-send:hover { opacity: 0.85; }
        .btn-send:disabled { opacity: 0.4; cursor: default; }

        .input-footer {
            max-width: 800px;
            margin: 8px auto 0;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <img src="/static/logo.png" class="logo-avatar" alt="IA Program">
                <span class="logo-name">IA Program</span>
            </div>
            <button class="btn-theme" onclick="toggleTheme()" title="Changer le thème">🌙</button>
        </div>

        <button class="btn-new" onclick="nouvelleConversation()">
            <span>✏️</span> Nouvelle conversation
        </button>

        <div class="sidebar-section-title">Aujourd'hui</div>
        <div id="conv-list"></div>

        <div class="sidebar-footer">
            <div class="user-avatar">A</div>
            <div class="user-info">
                <div class="user-name">Albert</div>
                <div class="user-plan">Plan gratuit</div>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="chat-header">
            <div class="chat-header-left">
                <img src="/static/logo.png" class="chat-header-avatar" alt="IA Program">
                <span class="chat-title">IA Program</span>
            </div>
            <span class="model-badge">llama-3.3-70b</span>
        </div>

        <div id="chat-area" style="flex:1;display:flex;flex-direction:column;overflow:hidden">

            <!-- Welcome screen -->
            <div class="welcome" id="welcome">
                <img src="/static/logo.png" class="welcome-avatar" alt="IA Program">
                <h2>Bonjour, Albert !</h2>
                <p>Je suis <strong>IA Program</strong>, ton assistant expert en programmation. Pose-moi n'importe quelle question sur le code !</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="suggerer('Comment créer une fonction en Python ?')">💡 Créer une fonction en Python</button>
                    <button class="suggestion" onclick="suggerer('Explique-moi c\'est quoi une API')">🌐 C'est quoi une API ?</button>
                    <button class="suggestion" onclick="suggerer('Comment déboguer mon code Python ?')">🐛 Déboguer du code Python</button>
                    <button class="suggestion" onclick="suggerer('Quelle est la différence entre HTML et CSS ?')">🎨 HTML vs CSS</button>
                </div>
            </div>

            <!-- Messages -->
            <div class="messages" id="messages" style="display:none"></div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="input"
                    placeholder="Pose ta question à IA Program..."
                    rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="btn-send" id="btn-send" onclick="envoyer()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <div class="input-footer">IA Program peut faire des erreurs. Vérifiez les informations importantes.</div>
        </div>
    </div>

    <script>
        const input = document.getElementById("input");
        const messagesEl = document.getElementById("messages");
        const welcomeEl = document.getElementById("welcome");
        const btnSend = document.getElementById("btn-send");

        let conversations = [{ id: 1, titre: "Nouvelle conversation" }];
        let convActive = 1;
        let isDark = false;

        renderConvList();

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle("dark", isDark);
            document.querySelector(".btn-theme").textContent = isDark ? "☀️" : "🌙";
        }

        function heureActuelle() {
            return new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
        }

        function renderConvList() {
            const list = document.getElementById("conv-list");
            list.innerHTML = conversations.map(c => `
                <div class="conv-item ${c.id === convActive ? 'active' : ''}" onclick="changerConv(${c.id})">
                    💬 ${c.titre}
                </div>
            `).join("");
        }

        function changerConv(id) {
            convActive = id;
            renderConvList();
        }

        function nouvelleConversation() {
            const id = conversations.length + 1;
            conversations.unshift({ id, titre: "Nouvelle conversation" });
            convActive = id;
            renderConvList();
            messagesEl.innerHTML = "";
            messagesEl.style.display = "none";
            welcomeEl.style.display = "flex";
            fetch("/clear", { method: "POST" });
        }

        function suggerer(texte) {
            input.value = texte;
            envoyer();
        }

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 160) + "px";
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                envoyer();
            }
        }

        async function envoyer() {
            const message = input.value.trim();
            if (!message) return;

            if (welcomeEl.style.display !== "none") {
                welcomeEl.style.display = "none";
                messagesEl.style.display = "flex";
                const titre = message.length > 30 ? message.substring(0, 30) + "..." : message;
                conversations[0].titre = titre;
                renderConvList();
            }

            ajouterMessage(message, "user");
            input.value = "";
            input.style.height = "auto";
            btnSend.disabled = true;

            const typingEl = document.createElement("div");
            typingEl.className = "typing-row";
            typingEl.id = "typing";
            typingEl.innerHTML = `
                <img src="/static/logo.png" class="msg-avatar" alt="IA">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesEl.appendChild(typingEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                document.getElementById("typing")?.remove();
                ajouterMessage(data.reponse, "ia");

            } catch (e) {
                document.getElementById("typing")?.remove();
                ajouterMessage("❌ Erreur de connexion. Réessaie !", "ia");
            }

            btnSend.disabled = false;
            input.focus();
        }

        function ajouterMessage(texte, role) {
            const row = document.createElement("div");
            row.className = "message-row";

            let avatarHTML = "";
            if (role === "ia") {
                avatarHTML = `<img src="/static/logo.png" class="msg-avatar" alt="IA Program">`;
            } else {
                avatarHTML = `<div class="msg-avatar-text">A</div>`;
            }

            const content = document.createElement("div");
            content.className = "msg-content";

            const name = document.createElement("div");
            name.className = "msg-name";
            name.textContent = role === "ia" ? "IA Program" : "Albert";

            const text = document.createElement("div");
            text.className = "msg-text";

            if (role === "ia" && texte.includes("```")) {
                text.innerHTML = formaterCode(texte);
                text.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
            } else {
                text.innerHTML = texte
                    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                    .replace(/\n/g, "<br>");
            }

            const time = document.createElement("div");
            time.className = "msg-time";
            time.textContent = heureActuelle();

            content.appendChild(name);
            content.appendChild(text);
            content.appendChild(time);

            row.innerHTML = avatarHTML;
            row.appendChild(content);
            messagesEl.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function formaterCode(texte) {
            return texte
                .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                .replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
                    `<pre><code class="language-${lang||'plaintext'}">${code.trim()}</code></pre>`)
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\n/g, "<br>");
        }
    </script>
</body>
</html>
